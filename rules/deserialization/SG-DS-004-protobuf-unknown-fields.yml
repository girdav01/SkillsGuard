id: SG-DS-004
name: Protobuf Unknown Fields Acceptance
description: >
  Detects Protocol Buffers deserialization that may accept unknown fields.
  When protobuf messages are parsed with unknown field acceptance enabled,
  attackers can inject unexpected data that bypasses schema validation,
  potentially leading to data corruption or logic bypass.
severity: medium
category: deserialization
owasp_llm: [LLM06]
owasp_ast: [AST05]
mitre_attack: []
target: SCRIPT
engine: REGEX
pattern:
  any:
    - "(?i)ParseFromString|MergeFromString|ParseDict"
    - "(?i)allow_unknown_field"
false_positive_notes: >
  Legitimate protobuf usage with ParseFromString or MergeFromString is
  common and safe when the input source is trusted. This rule may flag
  standard protobuf operations; correlate with the presence of
  allow_unknown_field settings to reduce noise.
remediation: >
  Disable acceptance of unknown fields in protobuf deserialization by
  setting DiscardUnknownFields or using strict parsing modes. Validate
  all protobuf input against the expected schema before processing.
  Avoid using allow_unknown_field in production configurations.
references:
  - https://protobuf.dev/programming-guides/proto3/
  - https://cwe.mitre.org/data/definitions/502.html
