id: SG-IS-003
name: Missing Security Profile
description: >
  Detects container configurations without seccomp or AppArmor security
  profiles. Containers running without mandatory access control profiles
  have a larger attack surface and may allow syscalls or file access
  patterns that could be used for container escape or privilege escalation.
severity: high
category: isolation
owasp_llm: [LLM06]
owasp_ast: [AST06]
mitre_attack: []
target: CONFIG
engine: REGEX
pattern:
  any:
    - "(?i)(?:FROM\\s+|image:\\s+)(?!.*(?:security_opt|seccomp|apparmor))"
false_positive_notes: >
  Some container runtimes apply default security profiles automatically.
  This rule may flag configurations that rely on runtime defaults rather
  than explicit profile declarations. Verify the runtime configuration
  before treating as a true positive.
remediation: >
  Add explicit seccomp and AppArmor profiles to container configurations.
  Use --security-opt seccomp=profile.json for Docker or specify
  seccompProfile in Kubernetes pod security contexts. Apply the default
  Docker seccomp profile at minimum and customize as needed.
references:
  - https://docs.docker.com/engine/security/seccomp/
  - https://kubernetes.io/docs/tutorials/security/seccomp/
