id: SG-MD-001
name: Author Impersonation
description: >
  Detects skill metadata that impersonates well-known AI companies or
  organizations using exact name matches, homoglyphs, or common
  misspellings. Attackers may claim authorship from trusted entities
  to gain user trust and bypass review.
severity: high
category: metadata
owasp_llm: [LLM06]
owasp_ast: [AST04]
mitre_attack: [T1036.005]
target: SKILL_MD
engine: REGEX
pattern:
  any:
    - "(?i)author:\\s*[\"']?(?:anthr[o0]p[i1l]c|[o0]pen[a@]i|micr[o0]s[o0]ft|g[o0]{2}gle|m[e3]ta|curs[o0]r)"
    - "(?i)author:\\s*[\"']?(?:0penai|openal|micro5oft|googl3|anthroplc)"
false_positive_notes: >
  Legitimate skills authored by employees of these organizations may
  trigger this rule. Verify the skill's provenance through official
  channels or code signing before dismissing the finding.
remediation: >
  Remove or correct the impersonated author field. Use the actual
  author or organization name. If the skill is legitimately published
  by the claimed organization, ensure it is distributed through
  official channels with proper verification.
references:
  - https://attack.mitre.org/techniques/T1036/005/
  - https://genai.owasp.org/llmrisk/llm06-excessive-agency/
