id: SG-MD-003
name: Missing License Field
description: >
  Detects skill metadata frontmatter that lacks a license field.
  Skills without declared licenses create legal ambiguity and may
  indicate hastily created or malicious skills that skip standard
  metadata conventions.
severity: low
category: metadata
owasp_llm: [LLM06]
owasp_ast: [AST04]
mitre_attack: []
target: SKILL_MD
engine: REGEX
pattern:
  any:
    - "(?s)^---\\n(?!.*license\\s*:).*?---"
false_positive_notes: >
  Some internal or private skills may not require a license field.
  This rule is primarily useful for skills distributed through
  public registries or shared across organizations.
remediation: >
  Add a license field to the skill's frontmatter metadata specifying
  the appropriate open-source or proprietary license. Use standard
  SPDX license identifiers (e.g., MIT, Apache-2.0, GPL-3.0) for
  consistency and clarity.
references:
  - https://spdx.org/licenses/
  - https://genai.owasp.org/llmrisk/llm06-excessive-agency/
